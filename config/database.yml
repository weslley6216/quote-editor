default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV['POSTGRES_HOST'] %>
  username: <%= ENV['POSTGRES_USER'] %>
  password: <%= ENV['POSTGRES_PASSWORD'] %>

development:
  primary:
    <<: *default
    database: quote_editor_development
  cache:
    <<: *default
    database: quote_editor_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: quote_editor_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: quote_editor_test

production:
  primary:
    <<: *default
    database: 'quote_editor'
