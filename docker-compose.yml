services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c 'bin/setup && rails server -b 0.0.0.0 -p 3000'
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - .:/opt/app
    depends_on:
      - db
